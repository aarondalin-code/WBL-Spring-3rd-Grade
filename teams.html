<script>
  // -----------------------------
  // Helpers (same style as your current file)
  // -----------------------------
  function safe(v){ return String(v ?? "").trim(); }
  function norm(v){ return safe(v).toLowerCase(); }

  const { fetchCsvCached, parseCsv } = window.CSVUtils;
  const SHEET_CACHE_TTL_MS = 5 * 60 * 1000;


  function numOrNull(x){
    const n = Number(safe(x));
    return Number.isFinite(n) ? n : null;
  }

  const unifiedGrid = document.getElementById("unifiedTeamsGrid");
  const teamsMsg = document.getElementById("teamsMsg");

  // team meta for color/logo/slug join
  const teamMetaBySlug = new Map(); // slug -> {name, slug, logo, color}
  const teamMetaByName = new Map(); // name -> { ... }

  let practiceRows = [];

function getTeamMetaForPractice(p){
  const slug = norm(p.TeamSlug);
  const name = norm(p.TeamName);
  if (slug && teamMetaBySlug.has(slug)) return teamMetaBySlug.get(slug);
  if (name && teamMetaByName.has(name)) return teamMetaByName.get(name);
  return {
    name: safe(p.TeamName) || "Team",
    slug: safe(p.TeamSlug) || "",
    logo: "",
    color: ""
  };
}

function practiceLinesHTML(p){
  const day = safe(p.PracticeDay);
  const time = safe(p.PracticeTime);
  const field = safe(p.PracticeField);
  const notes = safe(p.Notes);
  if (!day && !time && !field && !notes){
    return `<div class="muted small">Practice info coming soon.</div>`;
  }
  return `
    ${day ? `<div class="practiceLine"><span class="practiceKey">Day</span><span class="practiceVal">${day}</span></div>` : ""}
    ${time ? `<div class="practiceLine"><span class="practiceKey">Time</span><span class="practiceVal">${time}</span></div>` : ""}
    ${field ? `<div class="practiceLine"><span class="practiceKey">Field</span><span class="practiceVal">${field}</span></div>` : ""}
    ${notes ? `<div class="practiceNote muted small">${notes}</div>` : ""}
  `;
}

  function renderUnifiedTeamCards(teamRows){
    unifiedGrid.innerHTML = "";
    teamsMsg.textContent = "";

    const teams = teamRows
      .map(r => ({
        seed: numOrNull(r.Seed),
        name: safe(r.TeamName),
        slug: safe(r.TeamSlug),
        logo: safe(r.TeamLogo),
        color: safe(r.TeamColor)
      }))
      .filter(t => t.name && t.slug)
      .sort((a,b) => {
        const as = a.seed ?? 9999;
        const bs = b.seed ?? 9999;
        if (as !== bs) return as - bs;
        return a.name.localeCompare(b.name);
      });

    if (!teams.length) {
      teamsMsg.textContent = "No teams found. Check Teams CSV headers (TeamName, TeamSlug, TeamLogo).";
      return;
    }

    teams.forEach(t => {
      const relatedPractices = practiceRows
        .filter(p => norm(p.TeamSlug) === norm(t.slug) || norm(p.TeamName) === norm(t.name));

      const nameStyle = t.color ? `style="color:${t.color}"` : "";
      const teamColorVar = t.color || "#1e3fa8";
      const practiceHtml = relatedPractices.length
        ? relatedPractices.map(pr => `<div class="practiceLines" style="margin-top:8px;">${practiceLinesHTML(pr)}</div>`).join("")
        : `<div class="practiceLines"><div class="muted small">Practice info coming soon.</div></div>`;

      const card = document.createElement("article");
      card.className = "card unifiedTeamCard";
      card.innerHTML = `
        <div class="cardBody" style="--teamColor:${teamColorVar};">
          <div class="practiceHead">
            <img class="practiceLogo" src="${t.logo || ''}" alt="${t.name} logo" onerror="this.style.display='none';">
            <a class="practiceTeamName" ${nameStyle} href="./team.html?team=${encodeURIComponent(t.slug)}">${t.name}</a>
          </div>

   <div class="teamActions">
  <a class="teamActionBtn primary"
    href="./team.html?team=${encodeURIComponent(t.slug)}">View Roster</a>
  <a class="teamActionBtn primary"
    href="./team.html?team=${encodeURIComponent(t.slug)}#teamScheduleSection">Team Schedule</a>
</div>
<div class="practiceSectionLabel">Practice Schedule</div>
${practiceHtml}
        </div>
      `;
      unifiedGrid.appendChild(card);
    });

    teamsMsg.textContent = `${teams.length} team card${teams.length===1 ? '' : 's'} shown.`;
  }

  (async function init(){
    try {
      // Teams CSV
      const csv = await fetchCsvCached(window.SHEET?.TEAMS_CSV_URL, { ttlMs: SHEET_CACHE_TTL_MS });
      const rows = parseCsv(csv);

      // Build team meta (for practice join)
      teamMetaBySlug.clear();
      teamMetaByName.clear();
      rows.forEach(r => {
        const name = safe(r.TeamName);
        const slug = safe(r.TeamSlug);
        if (!name || !slug) return;
const meta = {
  name,
  slug,
  logo: safe(r.TeamLogo) || "",
  color: safe(r.TeamColor) || ""
};
        
        teamMetaBySlug.set(norm(slug), meta);
        teamMetaByName.set(norm(name), meta);
      });

      // Practices CSV
      if (window.SHEET?.PRACTICES_CSV_URL){
        const pcsv = await fetchCsvCached(window.SHEET.PRACTICES_CSV_URL, { ttlMs: SHEET_CACHE_TTL_MS });
        const prows = parseCsv(pcsv);
        practiceRows = prows.map(r => ({
          TeamSlug: safe(r.TeamSlug),
          TeamName: safe(r.TeamName),
          PracticeDay: safe(r.PracticeDay),
          PracticeTime: safe(r.PracticeTime),
          PracticeField: safe(r.PracticeField),
          Notes: safe(r.Notes)
        }));
      } else {
        practiceRows = [];
      }

      renderUnifiedTeamCards(rows);

    } catch (err) {
      console.error(err);
      alert("Teams page error: check TEAMS_CSV_URL in data.js and make sure the Teams tab is published to CSV.");
      teamsMsg.textContent = "Teams page error: " + (err?.message || String(err));
    }
  })();
</script>
